<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Portal | Login</title>
    <style>
        :root {
            /* Swapped out the old palette for your uniform Crimson Red branding theme */
            --primary-red: #8b0000;
            --btn-hover: #4a0000;
            --text-gray: #666;
            --border-color: #ddd;
            --input-focus: #fdf5f5;
            --accent-red: #dc3545;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            border-top: 5px solid var(--primary-red);
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: var(--text-gray);
            font-weight: 600;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            box-sizing: border-box;
            background-color: #fafafa;
            transition: all 0.2s ease;
        }
        input:focus {
            outline: none;
            border-color: var(--accent-red);
            background-color: #fff;
            box-shadow: 0 0 0 3px var(--input-focus);
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-red);
            border: none;
            color: white;
            font-size: 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: var(--btn-hover);
        }
        .footer-text {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: #888;
        }
        a {
            color: var(--accent-red);
            text-decoration: none;
            font-weight: 600;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Faculty Login</h2>
    <form id="loginForm">
        <div class="form-group">
            <label for="email">Institutional Email</label>
            <input type="email" id="email" placeholder="john.doe@university.edu" required>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>

        <button type="submit">Login</button>
    </form>
    <div class="footer-text">
        Don't have an account? <a href="Index.html">Sign up here</a>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const emailInput = document.getElementById('email').value.trim();
        const passwordInput = document.getElementById('password').value;

        // ==========================================
        // ADMIN CREDENTIAL INTERCEPTOR
        // ==========================================
        if (emailInput === "admin@university.edu" && passwordInput === "admin123") {
            localStorage.setItem('adminUser', JSON.stringify({ 
                role: 'administrator', 
                name: 'System Admin' 
            }));
            
            alert("Admin Access Granted. Opening Auditing Logs...");
            window.location.href = 'admin_dashboard.html';
            return; 
        }

        const credentials = {
            email: emailInput,
            password: passwordInput
        };

        try {
            // UPDATED: Replaced hardcoded localhost reference with a relative path endpoint
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(credentials)
            });

            const result = await response.json();

            if (response.ok) {
                localStorage.setItem('facultyUser', JSON.stringify(result.user));
                
                alert("Login Successful!");
                window.location.href = 'dashboard.html';
            } else {
                alert("Error: " + result.message);
            }
        } catch (error) {
            console.error("Connection Error:", error);
            // UPDATED: Adjusted fallback interface string to match network conditions globally
            alert("Could not connect to the server. Please verify your internet connection or service availability.");
        }
    });
</script>

</body>
</html>
